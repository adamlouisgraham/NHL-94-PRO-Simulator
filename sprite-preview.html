function _pcShade(hex, amt) {
    let r=parseInt(hex.slice(1,3),16)||0, g=parseInt(hex.slice(3,5),16)||0, b=parseInt(hex.slice(5,7),16)||0;
    r=Math.max(0,Math.min(255,r+amt)); g=Math.max(0,Math.min(255,g+amt)); b=Math.max(0,Math.min(255,b+amt));
    return '#'+[r,g,b].map(v=>v.toString(16).padStart(2,'0')).join('');
}

function pcRenderSprite(ctx, rows, cm, sc) {
    for(let y=0;y<rows.length;y++) {
        const row = rows[y];
        for(let x=0;x<row.length;x++) {
            const col = cm[row[x]];
            if(col) { ctx.fillStyle=col; ctx.fillRect(x*sc, y*sc, sc, sc); }
        }
    }
}

const TEAMS = [
    { code:'MTL', pri:'#AF1E2D', sec:'#192168' },
    { code:'TOR', pri:'#003E7E', sec:'#FFFFFF' },
    { code:'BOS', pri:'#FCB514', sec:'#000000' },
    { code:'CHI', pri:'#CF0A2C', sec:'#000000' },
    { code:'EDM', pri:'#FF4C00', sec:'#003087' },
    { code:'PIT', pri:'#000000', sec:'#FCB514' },
];

const SPRITES = [
    { label:'FWD v0 (breakaway)', rows: PC_SPR_FWD_0 },
    { label:'FWD v1 (wrist shot)', rows: PC_SPR_FWD_1 },
    { label:'FWD v2 (backhand)',   rows: PC_SPR_FWD_2 },
    { label:'DEF v0 (poke check)', rows: PC_SPR_DEF_0, section:'def' },
    { label:'DEF v1 (def. gap)',   rows: PC_SPR_DEF_1, section:'def' },
    { label:'GTL v0 (butterfly)',  rows: PC_SPR_GTL_0, section:'gtl' },
    { label:'GTL v1 (stand-up)',   rows: PC_SPR_GTL_1, section:'gtl' },
];

const sc = 4;
const W = 36 * sc, H = 46 * sc;

SPRITES.forEach(({label, rows, section}) => {
    const team = TEAMS[Math.floor(Math.random() * TEAMS.length)];
    const pri = team.pri, sec = team.sec;
    const cm = {
        '#': '#000000',
        'H': '#222233', 'h': '#556688',
        'V': '#AADDFF',
        'm': '#E0E0E0',
        's': '#F4C17A', 'S': '#C8905A',
        'j': _pcShade(pri,55), 'J': pri, 'd': _pcShade(pri,-50),
        'c': _pcShade(sec,30), 'C': sec,
        'g': '#111122', 'G': '#2a3a4a',
        'p': _pcShade(pri,-30),
        'b': '#111111', 'B': '#446677',
        'a': '#CCCCCC', 'A': '#888888',
        'k': '#7B5000', 'K': '#AA7830',
        'u': '#111111',
        'w': 'rgba(100,180,255,0.35)',
        'i': 'rgba(180,225,255,0.20)',
        '.': null,
    };
    const container = document.createElement('div');
    container.className = 'card';
    const cv = document.createElement('canvas');
    cv.width = W; cv.height = H;
    cv.style.background = '#0a0a14';
    const ctx = cv.getContext('2d');
    pcRenderSprite(ctx, rows, cm, sc);
    const lbl = document.createElement('label');
    lbl.textContent = label + ' — ' + team.code;
    container.appendChild(cv);
    container.appendChild(lbl);
    const rowId = section === 'def' ? 'def-row' : section === 'gtl' ? 'gtl-row' : 'fwd-row';
    document.getElementById(rowId).appendChild(container);
});
