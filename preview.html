<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>NHL '94 PRO — Sprite Preview</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #08090f;
    color: #ccc;
    font-family: 'Courier New', monospace;
    padding: 24px;
  }
  h1 {
    font-size: 13px;
    letter-spacing: 3px;
    color: #4af;
    text-transform: uppercase;
    margin-bottom: 4px;
  }
  .subtitle { font-size: 10px; color: #556; margin-bottom: 28px; }

  .section-title {
    font-size: 10px;
    letter-spacing: 2px;
    color: #fa4;
    text-transform: uppercase;
    margin: 28px 0 12px;
    border-bottom: 1px solid #1a1a2a;
    padding-bottom: 6px;
  }

  .sprite-grid {
    display: flex;
    flex-wrap: wrap;
    gap: 24px;
    margin-bottom: 8px;
  }

  .sprite-col {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
  }

  .sprite-name {
    font-size: 9px;
    color: #556;
    letter-spacing: 1px;
    text-transform: uppercase;
    margin-bottom: 4px;
  }

  .team-row {
    display: flex;
    gap: 6px;
    align-items: flex-end;
  }

  canvas {
    display: block;
    image-rendering: pixelated;
    border: 1px solid #1a1a28;
  }

  .team-label {
    font-size: 8px;
    color: #334;
    text-align: center;
    margin-top: 2px;
    letter-spacing: 1px;
  }

  .controls {
    margin-bottom: 20px;
    display: flex;
    gap: 12px;
    align-items: center;
    flex-wrap: wrap;
  }

  .controls label { font-size: 10px; color: #778; }

  select, input[type=range] {
    background: #111;
    border: 1px solid #333;
    color: #ccc;
    font-family: inherit;
    font-size: 10px;
    padding: 3px 6px;
  }

  .scale-val { font-size: 10px; color: #4af; min-width: 20px; }

  #status { font-size: 10px; color: #556; margin-bottom: 20px; }

  .error { color: #f44; }
</style>
</head>
<body>

<h1>NHL '94 PRO Simulator</h1>
<p class="subtitle">sprite preview — live from script.js</p>

<div class="controls">
  <label>Scale
    <input type="range" id="scaleSlider" min="2" max="6" value="4" style="width:80px">
  </label>
  <span class="scale-val" id="scaleVal">4×</span>
</div>

<p id="status">Loading script.js…</p>

<div id="output"></div>

<script>
const TEAMS = [
  { code: 'TOR', name: 'Toronto',    pri: '#003E7E', sec: '#FFFFFF' },
  { code: 'MTL', name: 'Montreal',   pri: '#AF1E2D', sec: '#192168' },
  { code: 'BOS', name: 'Boston',     pri: '#FCB514', sec: '#000000' },
  { code: 'CHI', name: 'Chicago',    pri: '#CF0A2C', sec: '#000000' },
  { code: 'EDM', name: 'Edmonton',   pri: '#FF4C00', sec: '#003087' },
  { code: 'PIT', name: 'Pittsburgh', pri: '#000000', sec: '#FCB514' },
  { code: 'NYR', name: 'NY Rangers', pri: '#0038A8', sec: '#CE1126' },
  { code: 'STL', name: 'St. Louis',  pri: '#002F87', sec: '#FCB514' },
];

const SPRITE_DEFS = [
  { key: 'PC_SPR_FWD_0', label: 'FWD v0 — breakaway', section: 'FORWARDS' },
  { key: 'PC_SPR_FWD_1', label: 'FWD v1 — wrist shot', section: 'FORWARDS' },
  { key: 'PC_SPR_FWD_2', label: 'FWD v2 — backhand',   section: 'FORWARDS' },
  { key: 'PC_SPR_DEF_0', label: 'DEF v0 — poke check', section: 'DEFENSE'  },
  { key: 'PC_SPR_DEF_1', label: 'DEF v1 — def. gap',   section: 'DEFENSE'  },
  { key: 'PC_SPR_GTL_0', label: 'GTL v0 — butterfly',  section: 'GOALIES'  },
  { key: 'PC_SPR_GTL_1', label: 'GTL v1 — stand-up',   section: 'GOALIES'  },
];

let SC = 4;
let spriteData = {};

function _pcShade(hex, amt) {
  let r = parseInt(hex.slice(1,3),16)||0,
      g = parseInt(hex.slice(3,5),16)||0,
      b = parseInt(hex.slice(5,7),16)||0;
  r = Math.max(0,Math.min(255,r+amt));
  g = Math.max(0,Math.min(255,g+amt));
  b = Math.max(0,Math.min(255,b+amt));
  return '#'+[r,g,b].map(v=>v.toString(16).padStart(2,'0')).join('');
}

function buildCM(pri, sec) {
  return {
    '#': '#000000',
    'H': '#222233', 'h': '#556688',
    'V': '#AADDFF',
    'm': '#E0E0E0',
    's': '#F4C17A', 'S': '#C8905A',
    'j': _pcShade(pri, 55), 'J': pri, 'd': _pcShade(pri, -50),
    'c': _pcShade(sec, 30), 'C': sec,
    'g': '#111122', 'G': '#2a3a4a',
    'p': _pcShade(pri, -30),
    'b': '#111111', 'B': '#446677',
    'a': '#CCCCCC', 'A': '#888888',
    'k': '#7B5000', 'K': '#AA7830',
    'u': '#111111',
    'w': 'rgba(100,180,255,0.35)',
    'i': 'rgba(180,225,255,0.20)',
    '.': null,
  };
}

function renderSprite(canvas, rows, pri, sec, sc) {
  const W = 36 * sc, H = 46 * sc;
  canvas.width  = W;
  canvas.height = H;
  const ctx = canvas.getContext('2d');
  ctx.clearRect(0, 0, W, H);
  const cm = buildCM(pri, sec);
  for (let y = 0; y < rows.length; y++) {
    const row = rows[y];
    for (let x = 0; x < row.length; x++) {
      const col = cm[row[x]];
      if (col) { ctx.fillStyle = col; ctx.fillRect(x*sc, y*sc, sc, sc); }
    }
  }
}

function render() {
  const out = document.getElementById('output');
  out.innerHTML = '';

  const sections = [...new Set(SPRITE_DEFS.map(d => d.section))];

  for (const section of sections) {
    const defs = SPRITE_DEFS.filter(d => d.section === section);

    const title = document.createElement('div');
    title.className = 'section-title';
    title.textContent = section;
    out.appendChild(title);

    const grid = document.createElement('div');
    grid.className = 'sprite-grid';

    for (const def of defs) {
      const rows = spriteData[def.key];
      if (!rows) continue;

      const col = document.createElement('div');
      col.className = 'sprite-col';

      const nameEl = document.createElement('div');
      nameEl.className = 'sprite-name';
      nameEl.textContent = def.label;
      col.appendChild(nameEl);

      const teamRow = document.createElement('div');
      teamRow.className = 'team-row';

      for (const team of TEAMS) {
        const wrap = document.createElement('div');
        const canvas = document.createElement('canvas');
        renderSprite(canvas, rows, team.pri, team.sec, SC);
        wrap.appendChild(canvas);

        const lbl = document.createElement('div');
        lbl.className = 'team-label';
        lbl.textContent = team.code;
        wrap.appendChild(lbl);
        teamRow.appendChild(wrap);
      }

      col.appendChild(teamRow);
      grid.appendChild(col);
    }

    out.appendChild(grid);
  }
}

function extractSprites(src) {
  const result = {};
  for (const def of SPRITE_DEFS) {
    const re = new RegExp(`const\\s+${def.key}\\s*=\\s*\\[([\\s\\S]*?)\\];`);
    const m = src.match(re);
    if (!m) { console.warn('Missing', def.key); continue; }
    // Parse the array of quoted strings
    const rows = [];
    const lineRe = /'([^']*)'/g;
    let lm;
    while ((lm = lineRe.exec(m[1])) !== null) rows.push(lm[1]);
    result[def.key] = rows;
  }
  return result;
}

async function init() {
  const statusEl = document.getElementById('status');
  try {
    const src = await fetch('script.js?' + Date.now()).then(r => {
      if (!r.ok) throw new Error(`HTTP ${r.status}`);
      return r.text();
    });
    spriteData = extractSprites(src);
    const found = Object.keys(spriteData).length;
    statusEl.textContent = `Loaded ${found}/${SPRITE_DEFS.length} sprites from script.js`;
    render();
  } catch(e) {
    statusEl.innerHTML = `<span class="error">Error: ${e.message} — run a local server (python -m http.server 8765)</span>`;
  }
}

document.getElementById('scaleSlider').addEventListener('input', function() {
  SC = +this.value;
  document.getElementById('scaleVal').textContent = SC + '×';
  if (Object.keys(spriteData).length) render();
});

init();
</script>
</body>
</html>
