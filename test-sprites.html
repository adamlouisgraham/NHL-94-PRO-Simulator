function _pcShade(hex, amt) {
    let r=parseInt(hex.slice(1,3),16)||0, g=parseInt(hex.slice(3,5),16)||0, b=parseInt(hex.slice(5,7),16)||0;
    r=Math.max(0,Math.min(255,r+amt)); g=Math.max(0,Math.min(255,g+amt)); b=Math.max(0,Math.min(255,b+amt));
    return '#'+[r,g,b].map(v=>v.toString(16).padStart(2,'0')).join('');
}

function pcRenderSprite(ctx, rows, cm, sc) {
    for (let y = 0; y < rows.length; y++) {
        const row = rows[y];
        for (let x = 0; x < row.length; x++) {
            const col = cm[row[x]];
            if (col) { ctx.fillStyle = col; ctx.fillRect(x * sc, y * sc, sc, sc); }
        }
    }
}

function pcDrawSprite(canvas, type, pri, sec, variant) {
    const sc = 5;
    canvas.width  = 36 * sc;  // 180
    canvas.height = 46 * sc;  // 230
    const ctx = canvas.getContext('2d');
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    const cm = {
        '#': '#000000',
        'H': '#222233', 'h': '#556688',
        'V': '#AADDFF',
        'm': '#E0E0E0',
        's': '#F4C17A', 'S': '#C8905A',
        'j': _pcShade(pri, 55), 'J': pri, 'd': _pcShade(pri, -50),
        'c': _pcShade(sec, 30), 'C': sec,
        'g': '#111122', 'G': '#2a3a4a',
        'p': _pcShade(pri, -30),
        'b': '#111111', 'B': '#446677',
        'a': '#CCCCCC', 'A': '#888888',
        'k': '#7B5000', 'K': '#AA7830',
        'u': '#111111',
        'w': 'rgba(100,180,255,0.35)',
        'i': 'rgba(180,225,255,0.20)',
        '.': null,
    };
    let rows;
    if (type === 'forward') {
        rows = [PC_SPR_FWD_0, PC_SPR_FWD_1, PC_SPR_FWD_2][variant % 3];
    } else if (type === 'defense') {
        rows = [PC_SPR_DEF_0, PC_SPR_DEF_1][variant % 2];
    } else {
        rows = [PC_SPR_GTL_0, PC_SPR_GTL_1][variant % 2];
    }
    pcRenderSprite(ctx, rows, cm, sc);
}

    { name:'MTL', pri:'#AF1E2D', sec:'#192168' },
    { name:'PIT', pri:'#000000', sec:'#CFC493' },
];
const types = ['goalie','defense','forward'];
const g = document.getElementById('g');
teams.forEach(t => {
    types.forEach(type => {
        const variants = type === 'forward' ? 3 : 2;
        for (let v = 0; v < variants; v++) {
            const div = document.createElement('div');
            div.className = 'card';
            div.innerHTML = `<h3>${t.name} ${type.slice(0,3).toUpperCase()} v${v}</h3>`;
            const c = document.createElement('canvas');
            c.style.width  = '120px';
            c.style.height = '153px';
            div.appendChild(c);
            g.appendChild(div);
            pcDrawSprite(c, type, t.pri, t.sec, v);
        }
    });
});
